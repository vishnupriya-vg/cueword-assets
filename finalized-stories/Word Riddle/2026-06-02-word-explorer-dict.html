<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--primary:#1A8C7D;--primaryDark:#0D6A5E;--accent:#F4A261;--textDark:#0D3D36;--textMuted:#8AADA8;}
  html,body{margin:0;padding:0;}*{box-sizing:border-box;}
  body{font-family:'DM Sans',-apple-system,sans-serif;}
  .card{width:360px;height:450px;overflow:hidden;display:flex;flex-direction:column;padding:32px 30px 30px;
    background:radial-gradient(circle, rgba(26,140,125,0.09) 1.8px, transparent 2px) 0 0 / 25px 25px, linear-gradient(165deg,#E8F6F4,#D2EEEA);}
  .header{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .appicon{width:33px;height:33px;border-radius:9px;box-shadow:0 2px 5px rgba(13,61,54,.18);}
  .brand .wm{font-size:15px;font-weight:800;color:var(--primaryDark);}
  .fmt{font-size:10.5px;font-weight:800;letter-spacing:.13em;color:var(--primary);text-transform:uppercase;}
  .content{flex:1;display:flex;flex-direction:column;justify-content:center;margin:14px 0;}
  .lead{font-size:16px;font-weight:700;color:var(--textDark);line-height:1.4;}
  .words{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .word-chip{
    background:#fff;border-radius:12px;padding:14px 10px;
    font-size:17px;font-weight:800;color:var(--primaryDark);
    text-align:center;box-shadow:0 4px 14px -4px rgba(13,61,54,.18);letter-spacing:-.01em;
  }
  .ask{margin-top:14px;font-size:17px;font-weight:800;color:var(--primary);}
  .bottom{display:flex;align-items:flex-end;gap:4px;}
  .fox{width:96px;height:auto;flex-shrink:0;margin:0 0 -6px -13px;filter:drop-shadow(0 6px 9px rgba(13,61,54,.20));}
  .cta{flex:1;padding:12px 14px;border-radius:13px;background:#fff;box-shadow:0 6px 16px -9px rgba(13,61,54,.28);font-size:13px;font-weight:700;color:var(--primaryDark);margin-bottom:6px;line-height:1.3;}
  .cta span{color:var(--accent);}
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="brand">
        <img class="appicon" src="../../../Project%20folder/icon.png" alt="Cueword">
        <span class="wm">Cueword</span>
      </div>
      <div class="fmt">&#128269; Word Explorer</div>
    </div>
    <div class="content">
      <div class="lead">These 4 words share a sneaky Latin root. One of them will surprise you.</div>
      <div class="words">
        <div class="word-chip">DICTATE</div>
        <div class="word-chip">PREDICT</div>
        <div class="word-chip">VERDICT</div>
        <div class="word-chip">INDICT</div>
      </div>
      <div class="ask">What connects them all?</div>
    </div>
    <div class="bottom">
      <img class="fox" src="../../../Project%20folder/fox_body_pointing.png" alt="Remi">
      <div class="cta">Drop your guess below &middot; <span>answer revealed tonight</span></div>
    </div>
  </div>
</body>
</html>
